<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Visitas em tempo real</title>

<link rel="icon" href="favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Arimo', sans-serif;
background:#ffffff;
margin:0;
}

.container{
max-width:760px;
margin:auto;
padding:28px 22px;
}

/* título */

h1{
font-size:24px;
margin-bottom:4px;
}

#contador{
font-size:14px;
color:#666;
margin-bottom:24px;
}

/* bloco */

.item{
padding:15px 14px;
border-radius:8px;
margin-bottom:8px;
transition:background .2s ease;
}

.item:nth-child(odd){ background:#f5f5f5; }
.item:nth-child(even){ background:#eeeeee; }

/* título */

.titulo{
font-size:16px;
line-height:1.35;
margin-bottom:6px;
}

.titulo a{
color:#000;
text-decoration:none;
}

.titulo a:hover{
text-decoration:underline;
}

/* autor + data */

.meta{
display:flex;
justify-content:space-between;
font-size:14px;
}

.autor{
color:#B71C1C;
font-weight:600;
}

.data{
color:#777;
}

/* destaque visita nova */

.flash{
animation:flash 1.8s ease;
}

@keyframes flash{
0%{background:#fff4a8;}
100%{background:inherit;}
}

/* texto em ascensão */

.trending{
border-left:4px solid #B71C1C;
}

.trending-label{
font-size:11px;
color:#B71C1C;
font-weight:700;
margin-left:6px;
}

/* celular */

@media (max-width:600px){

.container{
padding:22px 16px;
}

.titulo{
font-size:15px;
}

.meta{
font-size:13px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Visitas em tempo real</h1>
<div id="contador"></div>

<div id="lista"></div>

</div>

<script>

var api="https://script.google.com/macros/s/AKfycbxJkEccCVZOs4qOV45g6L_sjKH2L0US0Vpq2j8pWzyca4a8IpSbpCfuaLtKJYGtqxg/exec";

var anteriores=[];

function formatar(data){

var d=new Date(data);
var agora=new Date();
var diff=(agora-d)/1000;

if(diff<60) return "agora mesmo";

var dias=["dom","seg","ter","qua","qui","sex","sáb"];

return dias[d.getDay()]+", "+
String(d.getDate()).padStart(2,"0")+"."+
String(d.getMonth()+1).padStart(2,"0")+"."+
d.getFullYear()+" "+
String(d.getHours()).padStart(2,"0")+":"+
String(d.getMinutes()).padStart(2,"0");

}

function contarMinuto(data){

var agora=new Date();

return data.filter(function(item){

var d=new Date(item.data);

return (agora-d)/1000 < 60;

}).length;

}

function detectarAscensao(data){

var contagem={};

data.forEach(function(item){

contagem[item.titulo]=(contagem[item.titulo]||0)+1;

});

return contagem;

}

function carregar(){

fetch(api)
.then(r=>r.json())
.then(data=>{

var html="";
var novas=[];

var contagem=detectarAscensao(data);

data.forEach(function(item,i){

var id=item.data+i;
var nova=!anteriores.includes(id);

var trending=contagem[item.titulo]>=3;

html+=`
<div class="item ${nova?'flash':''} ${trending?'trending':''}">

<div class="titulo">
<a href="${item.url}" target="_blank">
${item.titulo}
</a>
${trending?'<span class="trending-label">em ascensão</span>':''}
</div>

<div class="meta">
<div class="autor">${item.autor}</div>
<div class="data">${formatar(item.data)}</div>
</div>

</div>
`;

novas.push(id);

});

document.getElementById("lista").innerHTML=html;

document.getElementById("contador").innerHTML=
contarMinuto(data)+" acessos no último minuto";

anteriores=novas;

});

}

carregar();
setInterval(carregar,4000);

</script>

</body>
</html>
