<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALCR ▪ Visitas em tempo real</title>

<link rel="icon" href="favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Arimo',sans-serif;
background:#ffffff;
margin:0;
}

.container{
max-width:760px;
margin:auto;
padding:28px 22px;
}

h1{
font-size:24px;
margin-bottom:6px;
}

.stats{
font-size:14px;
color:#666;
margin-bottom:22px;
display:flex;
justify-content:space-between;
}

.item{
padding:14px;
border-radius:8px;
margin-bottom:8px;
position:relative;
}

.item:nth-child(odd){background:#f5f5f5;}
.item:nth-child(even){background:#ececec;}

.titulo{
font-size:16px;
margin-bottom:6px;
}

.titulo a{
color:#B71C1C;
text-decoration:none;
font-weight:600;
}

.titulo a:hover {
color: #000000;
text-decoration: none;
}

.meta{
display:flex;
justify-content:space-between;
font-size:14px;
}

.autor{
font-weight:600;
}

.data{
color:#777;
}

/* destaque texto em ascensão */

.trending{
border-left:4px solid #B71C1C;
padding-left:10px;
}

.trending-label{
font-size:11px;
color:#B71C1C;
font-weight:700;
margin-left:6px;
}

@media (max-width: 600px) {
.data{
font-size:80%;
}
}

</style>

</head>

<body>

<div class="container">

<h1>ALCR ▪ Visitas em tempo real</h1>

<div class="stats">
<div id="ativos"></div>
<div id="contador"></div>
</div>

<div id="lista"></div>

</div>

<script>

var api="https://script.google.com/macros/s/AKfycbxJkEccCVZOs4qOV45g6L_sjKH2L0US0Vpq2j8pWzyca4a8IpSbpCfuaLtKJYGtqxg/exec";

function leitoresAtivos(data){

var agora=new Date();

return data.filter(function(item){

var d=new Date(item.data);
return (agora-d)/1000 < 180;

}).length;

}

function contarMinuto(data){

var agora=new Date();

return data.filter(function(item){

var d=new Date(item.data);
return (agora-d)/1000 < 60;

}).length;

}

function formatar(data){

var d=new Date(data);

var dias=["dom","seg","ter","qua","qui","sex","sáb"];

return dias[d.getDay()]+", "+
String(d.getDate()).padStart(2,"0")+"."+
String(d.getMonth()+1).padStart(2,"0")+"."+
d.getFullYear()+" "+
String(d.getHours()).padStart(2,"0")+":"+
String(d.getMinutes()).padStart(2,"0");

}

function detectarAscensao(data){

var contagem={};

data.forEach(function(item){

contagem[item.titulo]=(contagem[item.titulo]||0)+1;

});

return contagem;

}

function carregar(){

fetch(api)
.then(r=>r.json())
.then(data=>{

document.getElementById("ativos").innerHTML=
leitoresAtivos(data)+" leitores ativos";

document.getElementById("contador").innerHTML=
contarMinuto(data)+" acessos no último minuto";

var contagem=detectarAscensao(data);

var html="";

data.forEach(function(item){

var trending = contagem[item.titulo] >= 3;

html+=`
<div class="item ${trending?'trending':''}">

<div class="titulo">
<a href="${item.url}" target="_blank">${item.titulo}</a>
${trending?'<span class="trending-label">em ascensão</span>':''}
</div>

<div class="meta">
<div class="autor">${item.autor}</div>
<div class="data">${formatar(item.data)}</div>
</div>

</div>
`;

});

document.getElementById("lista").innerHTML=html;

});

}

carregar();
setInterval(carregar,4000);

</script>

</body>
</html>
